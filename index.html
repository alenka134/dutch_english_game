<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dutch-English Phrase Game</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5KP53L6GPH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-5KP53L6GPH');
    </script>
</head>

<body>

<div class="page-stack">

<!-- Game Logo -->
<div class="logo-container">
    <img src="img/logo.png" alt="Dutch–English phrase game logo" class="logo" width="72" loading="lazy">
</div>

<h1>Dutch-English Phrase Game</h1>

<!-- Name Input Section -->
<div class="name-input">
    <label for="name">What is your name?</label>
    <input type="text" id="name">
    <button id="enter-btn">Enter</button>
</div>

<!-- Category Selector Section -->
<div class="category-selection" style="display: none;">
    <label for="category-selector">Select Phrase Category:</label>
    <select id="category-selector"></select>
</div>

<!-- Start Game Button -->
<button id="start-btn" style="display: none;">
    <i class="fas fa-play"></i> Start Game!
</button>

<!-- View Results Button -->
<button id="view-results-btn" type="button" style="display: none; margin-top: 12px;">
    <i class="fas fa-chart-column"></i> View results
</button>

<!-- Game Interface -->
<div class="game" style="display: none;">
    <!-- Timer -->
    <div class="timer">
        Time left: <span id="timer">30</span> seconds
    </div>

    <!-- Progress Bar -->
    <div id="progress-container" style="width: 300px; height: 30px; margin: 20px auto;">
        <div id="progress-bar" style="width: 100%; height: 100%; background-color: #ddd; border-radius: 15px; box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);">
            <div id="bar-fill" style="height: 100%; width: 100%; background-color: green; border-radius: 15px; transition: width 1s, background-color 0.5s;"></div>
        </div>
    </div>

    <!-- Question and Choices -->
    <div class="question"></div>
    <div class="choices"></div>

    <!-- Result -->
    <div class="result"></div>

    <!-- Progress / Resume-style indicator -->
    <button id="round-progress-btn" type="button" style="display: none; margin-top: 10px;">
        <i class="fas fa-circle-play"></i> Resume (1/1)
    </button>

    <!-- Game Controls -->
    <div class="game-controls">
        <button id="pause-btn" type="button">
            <i class="fas fa-pause"></i> Pause
        </button>
        <button id="stop-btn" type="button">
            <i class="fas fa-stop"></i> Stop
        </button>
    </div>

    <!-- Hear Phrase Button -->
    <button id="hear-phrase-btn">
        <i class="fas fa-volume-up"></i> Hear Phrase
    </button>

    <!-- Next Button -->
    <button id="next-btn" style="display: none;">Next</button>

    <!-- Play Again Button (shown on end screen) -->
    <button id="play-again-btn" type="button" style="display: none; margin-top: 14px;">
        <i class="fas fa-rotate-right"></i> Play again
    </button>

    <!-- Back Button (shown on results screen) -->
    <button id="back-btn" type="button" style="display: none; margin-top: 12px;">
        <i class="fas fa-arrow-left"></i> Back
    </button>
</div>

<!-- Stop / Exit Modal -->
<div id="stop-modal" class="modal" style="display: none;" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="stop-modal-title">
        <div id="stop-modal-title" class="modal-title">Game paused</div>
        <div class="modal-text">Do you want to continue, or end the game?</div>
        <div class="modal-actions">
            <button id="stop-back-btn" type="button">
                <i class="fas fa-arrow-left"></i> Back to game
            </button>
            <button id="stop-end-btn" type="button">
                <i class="fas fa-flag-checkered"></i> End game
            </button>
        </div>
    </div>
</div>

</div><!-- .page-stack -->

<footer class="site-footer" role="contentinfo">
    <nav class="site-footer__nav" aria-label="Author links">
        <a href="https://elenao.pythonanywhere.com/#creator"
           class="site-footer__link"
           target="_blank"
           rel="noopener noreferrer"
           data-tooltip="Creator"
           aria-label="Credits — opens creator section in a new tab">
            <span class="site-footer__label">
                <span class="site-footer__star" aria-hidden="true">⭐</span><span class="site-footer__label-text">Credits</span>
            </span>
        </a>
        <a href="https://www.linkedin.com/company/106096022/admin/dashboard/"
           class="site-footer__link"
           target="_blank"
           rel="noopener noreferrer"
           data-tooltip="Company"
           aria-label="Company, opens in a new tab">
            <i class="fab fa-linkedin-in site-footer__icon" aria-hidden="true"></i>
            <span class="site-footer__label">LinkedIn</span>
        </a>
    </nav>
</footer>

<!-- External Script -->
<script src="script.js"></script>

</body>

</html>
